# Supabase project config. Run `supabase link` then `supabase db push` to apply migrations.
project_id = "vouchrank"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]

[db]
port = 54322
major_version = 17

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_confirmations = true

[functions.submit-review]
verify_jwt = false   # public funnel endpoint; validates + rate-limits internally

[functions.widget-reviews]
verify_jwt = false   # public widget endpoint; read-only, CORS *

[functions.public-location]
verify_jwt = false   # public funnel branding read; single location, safe fields only

[functions.create-upload-url]
verify_jwt = false   # public funnel video upload; mints a one-object signed URL

[functions.stripe-webhook]
verify_jwt = false   # Stripe calls this; verified via signature

[functions.google-oauth-callback]
verify_jwt = false   # Google redirect; state param verified internally

# run-aio-audit and sync-google-reviews intentionally keep the default
# verify_jwt = true. Today they're only invoked by signed-in dashboard users, so
# the gateway JWT check is useful defense-in-depth. They ALSO support a trusted
# cron/internal caller via the `x-internal-secret` header (see _shared/getCaller),
# but that path can't pass the gateway while verify_jwt = true. When you wire the
# scheduled sync/audit jobs (set FUNCTION_INTERNAL_SECRET), flip BOTH to
# verify_jwt = false so the secret-only caller reaches the function — getCaller
# then enforces auth internally (internal secret OR a signed-in owner).
# [functions.run-aio-audit]
# verify_jwt = false
# [functions.sync-google-reviews]
# verify_jwt = false
